name = "adradar"
pages_build_output_dir = "/"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron: ejecutar monitoreo diario a las 9am UTC (6am Chile)
[triggers]
crons = ["0 9 * * *"]

# KV namespace para guardar snapshots (crear en Cloudflare dashboard)
# Workers & Pages > KV > Create namespace "ADRADAR_KV"
# Luego agregar binding en Pages > Settings > Functions > KV namespace bindings
# Variable name: ADRADAR_KV
